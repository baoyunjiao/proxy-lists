<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Proxy List</title>

<style>
:root {
  --blue: #4aa3df;
  --blue-light: #eaf6fd;
  --border: #d8e6f3;
  --text: #333;
  --bg: #f5f9fc;
}

* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 24px;
}

h2 {
  margin: 0 0 16px;
  color: #2c6fa3;
}

.filter {
  background: white;
  padding: 12px 16px;
  border-radius: 10px;
  box-shadow: 0 4px 12px rgba(0,0,0,.04);
  margin-bottom: 16px;
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.select-box {
  display: flex;
  align-items: center;
  gap: 8px;
}

select {
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: white;
}

.tags {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag {
  background: var(--blue-light);
  color: #1d5e8a;
  border-radius: 14px;
  padding: 4px 10px;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
}

.tag span {
  margin-left: 6px;
  cursor: pointer;
  font-weight: bold;
  opacity: .6;
}
.tag span:hover { opacity: 1; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 12px rgba(0,0,0,.04);
}

th, td {
  padding: 10px 8px;
  text-align: left;
  border-bottom: 1px solid #eef3f7;
}

th {
  background: var(--blue-light);
  color: #2c6fa3;
  font-weight: 600;
}

tr:hover td {
  background: #f8fbfe;
}

button {
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 13px;
}

button:hover {
  filter: brightness(1.05);
}
</style>
</head>
<body>

<h2>🌐 代理列表</h2>

<div class="filter">
  <div class="select-box">
    国家：
    <select id="countrySelect">
      <option value="">选择国家</option>
    </select>
    <div id="countryTags" class="tags"></div>
  </div>

  <div class="select-box">
    协议：
    <select id="protocolSelect">
      <option value="">选择协议</option>
      <option value="https">HTTPS</option>
      <option value="socks4">SOCKS4</option>
      <option value="socks5">SOCKS5</option>
    </select>
    <div id="protocolTags" class="tags"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>IP</th><th>端口</th><th>协议</th><th>国家</th>
<th>延迟</th><th>成功率</th><th>上次检测</th><th>复制</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let data = [];
const selectedCountries = new Set();
const selectedProtocols = new Set();

fetch('proxies.json').then(r => r.json()).then(d => {
  data = d;
  init();
  render();
});

function init() {
  const cs = [...new Set(data.map(i => i.country_cn))];
  const sel = document.getElementById('countrySelect');
  cs.forEach(c => {
    const o = document.createElement('option');
    o.value = c;
    o.textContent = c;
    sel.appendChild(o);
  });
}

countrySelect.onchange = e => {
  if (e.target.value) {
    selectedCountries.add(e.target.value);
    e.target.value = '';
    renderTags(); render();
  }
};

protocolSelect.onchange = e => {
  if (e.target.value) {
    selectedProtocols.add(e.target.value);
    e.target.value = '';
    renderTags(); render();
  }
};

function renderTags() {
  renderTagGroup('countryTags', selectedCountries);
  renderTagGroup('protocolTags', selectedProtocols);
}

function renderTagGroup(id, set) {
  const box = document.getElementById(id);
  box.innerHTML = '';
  [...set].forEach(v => {
    const t = document.createElement('div');
    t.className = 'tag';
    t.innerHTML = `${v}<span>×</span>`;
    t.querySelector('span').onclick = () => {
      set.delete(v);
      renderTags(); render();
    };
    box.appendChild(t);
  });
}

function render() {
  tbody.innerHTML = '';
  data.filter(i =>
    (!selectedCountries.size || selectedCountries.has(i.country_cn)) &&
    (!selectedProtocols.size || selectedProtocols.has(i.protocol))
  ).forEach(i => {
    const rate = i.total < 3 ? '新节点（测试次数小于3）'
      : `${(i.success / i.total * 100).toFixed(1)}% (${i.success}/${i.total})`;
    tbody.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${i.ip}</td>
        <td>${i.port}</td>
        <td>${i.protocol}</td>
        <td>${i.country_cn}</td>
        <td>${i.latency} ms</td>
        <td>${rate}</td>
        <td>${ago(i.last_check)}</td>
        <td><button onclick="copy('${i.ip}:${i.port}')">复制</button></td>
      </tr>
    `);
  });
}

function ago(ts) {
  const s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return s + ' 秒前';
  if (s < 3600) return Math.floor(s/60) + ' 分钟前';
  return Math.floor(s/3600) + ' 小时前';
}

function copy(t) {
  navigator.clipboard.writeText(t).then(() => alert('已复制 ' + t));
}
</script>

</body>
</html>
