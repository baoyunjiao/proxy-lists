<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="description" content="这是一个定时更新的 proxy list（代理列表），包含 HTTPS|SOCKS4|SOCKS5 节点。（HTTPS、SOCKS5全都支持SSL，SOCKS4不确定）">
<meta name="author" content="CB-X2-Jun">
<title>Proxy List</title>

<!-- 国旗图标 -->
<link
  rel="stylesheet"
  href="https://lipis.github.io/flag-icons/css/flag-icons.min.css"
/>

<style>
/* =====================
   亮色模式（原样）
===================== */
:root {
  --blue: #4aa3df;
  --blue-light: #eaf6fd;
  --border: #d8e6f3;
  --text: #333;
  --bg: #f5f9fc;

  --card: #ffffff;
  --hover: #f8fbfe;
}

/* =====================
   暗色模式变量覆盖
===================== */
body.dark {
  --blue: #5bb3ff;
  --blue-light: #1e2a36;
  --border: #2b3a48;
  --text: #e6edf3;
  --bg: #0f1720;

  --card: #141e28;
  --hover: #1b2733;
}

* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 24px;
}

h2 {
  margin: 0 0 16px;
  color: #2c6fa3;
}

/* =====================
   顶部开关
===================== */
.theme-toggle {
  position: fixed;
  top: 16px;
  right: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  user-select: none;
}

.theme-toggle input {
  width: 42px;
  height: 22px;
  appearance: none;
  background: #ccc;
  border-radius: 999px;
  position: relative;
  cursor: pointer;
}

.theme-toggle input::before {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  top: 2px;
  left: 2px;
  background: white;
  border-radius: 50%;
  transition: .2s;
}

.theme-toggle input:checked {
  background: var(--blue);
}

.theme-toggle input:checked::before {
  transform: translateX(20px);
}

/* =====================
   原样式
===================== */
.filter {
  background: var(--card);
  padding: 12px 16px;
  border-radius: 10px;
  box-shadow: 0 4px 12px rgba(0,0,0,.04);
  margin-bottom: 16px;
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.select-box {
  display: flex;
  align-items: center;
  gap: 8px;
}

select {
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
}

.tags {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag {
  background: var(--blue-light);
  color: var(--text);
  border-radius: 14px;
  padding: 4px 10px;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card);
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px 8px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

th {
  background: var(--blue-light);
  color: #2c6fa3;
}

tr:hover td {
  background: var(--hover);
}

.country {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

button {
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
}

/* =====================
   ✅ 新增：进度条样式
===================== */
.bar-wrap {
  margin-top: 4px;
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0;
}

.bar.green { background: #3cb371; }
.bar.yellow { background: #f0c24b; }
.bar.red { background: #e5533d; }
</style>
</head>

<body>

<label class="theme-toggle">
  ☀️ <input type="checkbox" id="themeToggle"> 🌙
</label>

<h2>🌐 代理列表</h2>

<div class="filter">
  <div class="select-box">
    国家：
    <select id="countrySelect">
      <option value="">选择国家</option>
    </select>
    <div id="countryTags" class="tags"></div>
  </div>

  <div class="select-box">
    协议：
    <select id="protocolSelect">
      <option value="">选择协议</option>
      <option value="https">HTTPS</option>
      <option value="socks4">SOCKS4</option>
      <option value="socks5">SOCKS5</option>
    </select>
    <div id="protocolTags" class="tags"></div>
  </div>
  <div class="select-box">
  端口：
  <select id="portSelect">
    <option value="">选择端口</option>
  </select>
  <div id="portTags" class="tags"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>IP</th><th>端口</th><th>协议</th><th>国家</th>
<th>延迟</th><th>成功率</th><th>上次检测</th><th>复制</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
/* 亮暗模式 */
const toggle = document.getElementById('themeToggle');
if (localStorage.getItem('theme') === 'dark') {
  document.body.classList.add('dark');
  toggle.checked = true;
}
toggle.onchange = () => {
  document.body.classList.toggle('dark', toggle.checked);
  localStorage.setItem('theme', toggle.checked ? 'dark' : 'light');
};

/* 原 JS */
let data = [];
const selectedCountries = new Set();
const selectedProtocols = new Set();
const selectedPorts = new Set();


fetch('proxies.json').then(r => r.json()).then(d => {
  data = d;
  init(); render();
});

function init() {
  const cs = [...new Set(data.map(i => i.country_cn))];
  cs.forEach(c => countrySelect.add(new Option(c, c)));

  const ps = [...new Set(data.map(i => i.port))]
    .sort((a, b) => a - b);
  ps.forEach(p => portSelect.add(new Option(p, p)));
}


countrySelect.onchange = e => {
  if (e.target.value) {
    selectedCountries.add(e.target.value);
    e.target.value = '';
    renderTags(); render();
  }
};
protocolSelect.onchange = e => {
  if (e.target.value) {
    selectedProtocols.add(e.target.value);
    e.target.value = '';
    renderTags(); render();
  }
};
portSelect.onchange = e => {
  if (e.target.value) {
    selectedPorts.add(e.target.value);
    e.target.value = '';
    renderTags(); render();
  }
};

function renderTags() {
  renderTagGroup('countryTags', selectedCountries, true);
  renderTagGroup('protocolTags', selectedProtocols, false);
  renderTagGroup('portTags', selectedPorts, false);
  }

function renderTagGroup(id, set, withFlag) {
  const box = document.getElementById(id);
  box.innerHTML = '';
  [...set].forEach(v => {
    const t = document.createElement('div');
    t.className = 'tag';
    const code = withFlag ? data.find(i => i.country_cn === v)?.country : '';
    t.innerHTML = `${code ? `<span class="fi fi-${code.toLowerCase()}"></span>` : ''}${v}<span>×</span>`;
    t.lastChild.onclick = () => { set.delete(v); renderTags(); render(); };
    box.appendChild(t);
  });
}

/* =====================
   ✅ 进度条计算逻辑
===================== */
function rateBar(success, total) {
  if (!total) return '';
  const pct = Math.min(100, success / total * 100);
  const color = pct <= 40 ? 'red' : pct <= 70 ? 'yellow' : 'green';
  return `
    <div class="bar-wrap">
      <div class="bar ${color}" style="width:${pct}%"></div>
    </div>`;
}

function latencyBar(ms) {
  const pct = Math.min(100, ms / 5000 * 100);
  const color = ms <= 500 ? 'green' : ms <= 1500 ? 'yellow' : 'red';
  return `
    <div class="bar-wrap">
      <div class="bar ${color}" style="width:${pct}%"></div>
    </div>`;
}

function render() {
  tbody.innerHTML = '';
  data.filter(i =>
    (!selectedCountries.size || selectedCountries.has(i.country_cn)) &&
    (!selectedProtocols.size || selectedProtocols.has(i.protocol))
  ).forEach(i => {
    const rateText = i.total < 3
      ? '新节点 (测试次数小于3)'
      : `${(i.success / i.total * 100).toFixed(1)}% (${i.success}/${i.total})`;

    tbody.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${i.ip}</td>
        <td>${i.port}</td>
        <td>${i.protocol}</td>
        <td><span class="country">
          <span class="fi fi-${i.country.toLowerCase()}"></span>${i.country_cn}
        </span></td>
        <td>${i.latency} ms${latencyBar(i.latency)}</td>
        <td>${rateText}${rateBar(i.success, i.total)}</td>
        <td>${ago(i.last_check)}</td>
        <td><button onclick="copy('${i.ip}:${i.port}')">复制</button></td>
      </tr>
    `);
  });
}

function ago(ts) {
  const s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return s + ' 秒前';
  if (s < 3600) return Math.floor(s/60) + ' 分钟前';
  return Math.floor(s/3600) + ' 小时前';
}

function copy(t) {
  navigator.clipboard.writeText(t).then(() => alert('已复制 ' + t));
}
</script>

</body>
</html>
