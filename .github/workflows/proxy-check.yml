name: Proxy Check

concurrency:
  group: proxy-update
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "25 1 * * *"
    - cron: "50 2 * * *"
    - cron: "15 4 * * *"
    - cron: "40 5 * * *"
    - cron: "5 7 * * *"
    - cron: "30 8 * * *"
    - cron: "55 9 * * *"
    - cron: "20 11 * * *"
    - cron: "45 12 * * *"
    - cron: "10 14 * * *"
    - cron: "35 15 * * *"
    - cron: "0 17 * * *"
    - cron: "25 18 * * *"
    - cron: "50 19 * * *"
    - cron: "15 21 * * *"
    - cron: "40 22 * * *"

  workflow_dispatch:
  # workflow_run:
  #   workflows: [Deploy static content to Pages]
  #   types:
  #     - completed

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install pysocks

      - name: Run checker
        run: python scripts/check_proxy.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/proxies.json
          git add data/history.json
          git commit -m "Update proxies" || exit 0
          git push
